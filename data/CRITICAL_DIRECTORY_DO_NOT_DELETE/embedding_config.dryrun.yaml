dataset:
  trajectories_dir: data/trajectories_dryrun
  artifacts_dir: data/embedding_artifacts_dryrun
  n_per_system: 6
  duration_s: 8.0
  n_steps: 240
  seed: 7
  train_frac: 0.70
  val_frac: 0.20

task:
  window_size: 24
  horizons: [1, 3, 6]
  stride: 3

experiment:
  seed_grid: [3, 5]
  embedding_list: [physics_features_v1, raw_window, fft_features, hybrid_physics_fft]
  model_list: [persistence, linear, ridge, random_forest, gradient_boosting, mlp_small]

search:
  trials_per_model: 3
  max_parallel_jobs: 1

selection:
  primary_metric: weighted_rmse
  horizon_weights: [0.6, 0.3, 0.1]
  top_k: 2
