dataset:
  trajectories_dir: data/trajectories
  artifacts_dir: data/embedding_artifacts
  n_per_system: 80
  duration_s: 30.0
  n_steps: 1200
  seed: 42
  train_frac: 0.70
  val_frac: 0.20

task:
  window_size: 64
  horizons: [1, 5, 10, 20]
  stride: 4

experiment:
  seed_grid: [11, 29, 47, 71, 97]
  embedding_list: [physics_features_v1, raw_window, fft_features, hybrid_physics_fft]
  model_list: [persistence, linear, ridge, random_forest, gradient_boosting, mlp_small, mlp_medium]

search:
  trials_per_model: 20
  max_parallel_jobs: 1

selection:
  primary_metric: weighted_rmse
  horizon_weights: [0.45, 0.30, 0.15, 0.10]
  top_k: 3
