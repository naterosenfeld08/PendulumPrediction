ensemble:
  n_pendulums: 500          # options: 500, 1000, 1500
  seed: 42

parameters:
  m1: [0.5, 2.0]            # kg
  m2: [0.5, 2.0]
  L1: [0.5, 1.5]            # m
  L2: [0.5, 1.5]
  theta1: [0.01, 3.14]      # rad — initial angular displacement, arm 1
  theta2: [0.01, 3.14]      # rad — initial angular displacement, arm 2
  omega1: [0.0, 1.0]        # rad/s — initial angular velocity, arm 1
  omega2: [0.0, 1.0]        # rad/s — initial angular velocity, arm 2

integration:
  t_span: [0, 30]
  n_steps: 3000
  rtol: 1.0e-9
  atol: 1.0e-12
  energy_drift_max_relative: 1.0e-6   # hard fail if max |E(t)-E0| / |E0| exceeds this

statistics:
  confidence_level: 0.95
  bootstrap_iterations: 1000

lyapunov:
  epsilon: 0.0              # chaos threshold; 0.0 = theoretically strict
  delta0: 1.0e-10           # initial separation in state space
  t_lyapunov: 20            # time horizon for MLE computation
