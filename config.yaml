ensemble:
  n_pendulums: 500          # options: 500, 1000, 1500
  seed: 42
  checkpoint_every: 25    # append ensemble checkpoint after this many completed runs
  n_jobs: -1              # joblib.Parallel jobs (-1 = all cores)

parameters:
  m1: [0.5, 2.0]            # kg
  m2: [0.5, 2.0]
  L1: [0.5, 1.5]            # m
  L2: [0.5, 1.5]
  theta1: [0.01, 3.14]      # rad — initial angular displacement, arm 1
  theta2: [0.01, 3.14]      # rad — initial angular displacement, arm 2
  omega1: [0.0, 1.0]        # rad/s — initial angular velocity, arm 1
  omega2: [0.0, 1.0]        # rad/s — initial angular velocity, arm 2

integration:
  t_span: [0, 30]
  n_steps: 3000
  rtol: 1.0e-9
  atol: 1.0e-12
  # Scaled drift (see physics.energy); RK45 can land just above 1e-6 on stiff LHS samples.
  energy_drift_max_relative: 2.0e-6

statistics:
  confidence_level: 0.95
  bootstrap_iterations: 1000
  # Cheaper bootstrap count for matplotlib CI bands (full value still used where noted).
  figure_bootstrap_iterations: 80
  # For large N, fitting GPR on every point is slow; cap training rows (None = use all).
  gpr_fit_max_samples: null
  gpr_random_state: 0

inverse:
  # Upper-CI cap on var(KE₂/KE_total) for the inverse problem in main/report.
  target_variance: 0.015
  # Bootstrap iterations when building the θ₁ grid for root-finding (not per-step brentq).
  bootstrap_iterations: 150
  theta_grid_points: 96

lyapunov:
  epsilon: 0.0              # chaos threshold; 0.0 = theoretically strict
  delta0: 1.0e-10           # initial separation in state space
  t_lyapunov: 20            # time horizon for MLE computation

# Prediction target: instantaneous KE₂/KE_tot at sampled times; sharpness = OOF interval width;
# breakdown time = first t where truth falls outside OOF GPR interval (see stats.breakdown).
prediction:
  enabled: true
  n_time_samples: 32        # indices along integration grid (inclusive endpoints)
  cv_folds: 5
  cv_random_state: 0
  # analytic: fast GP predictive std; bootstrap: reuse stats.predict_with_ci (slow).
  interval_method: analytic
  bootstrap_iterations: 80  # used only if interval_method: bootstrap
